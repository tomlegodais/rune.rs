services:
  postgres:
    image: postgres:17
    container_name: runers-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supers3cr3t!
      POSTGRES_DB: runers
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

volumes:
  pgdata:
